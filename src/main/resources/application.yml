security:
  require-ssl: false

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/photosite
    username: root
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    #      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  resources:
    static-locations: file:./src/test/resources/website
#    static-locations: file:E:/Programmierung/www/webserver/www/website

certbot:
#  uri: https://acme-staging-v02.api.letsencrypt.org/directory
  uri: https://acme-v02.api.letsencrypt.org/directory
